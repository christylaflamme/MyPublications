<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Christy LaFlamme — Publications</title>
<style>
  :root {
    --accent: #0d9488;
    --accent-soft: #0d948822;
    --bg: #ffffff;
    --text: #1a1a1a;
    --text-muted: #6b6b6b;
    --border: #e5e5e5;
    --card-bg: #fafafa;
  }
  :root[data-theme="dark"] {
    --bg: #16191a;
    --text: #e9e9e9;
    --text-muted: #9a9a9a;
    --border: #2e3335;
    --card-bg: #1e2224;
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --bg: #16191a;
      --text: #e9e9e9;
      --text-muted: #9a9a9a;
      --border: #2e3335;
      --card-bg: #1e2224;
    }
  }

  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: Georgia, "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Palatino, serif;
    line-height: 1.6;
  }
  .page {
    max-width: 820px;
    margin: 0 auto;
    padding: 3.5rem 1.5rem 5rem;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 1rem;
    padding-bottom: 1.75rem;
    margin-bottom: 2.5rem;
    border-bottom: 2px solid var(--text);
  }
  h1 {
    font-size: 2.2rem;
    font-weight: 700;
    letter-spacing: -0.01em;
    margin: 0 0 0.4rem;
  }
  .bio {
    color: var(--text-muted);
    margin: 0 0 0.85rem;
    font-size: 1.02rem;
    font-style: italic;
  }
  .links {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 0.55rem;
    font-size: 0.9rem;
  }
  .links a {
    color: var(--accent);
    text-decoration: none;
  }
  .links a:hover { text-decoration: underline; }
  .links .sep {
    color: var(--border);
    user-select: none;
  }

  #theme-toggle {
    border: 1px solid var(--border);
    background: var(--card-bg);
    color: var(--text);
    border-radius: 999px;
    width: 2.4rem;
    height: 2.4rem;
    font-size: 1.1rem;
    cursor: pointer;
    flex-shrink: 0;
  }
  #theme-toggle:hover { border-color: var(--accent); }

  .stats {
    display: flex;
    gap: 1rem;
    margin-bottom: 2.5rem;
  }
  .stat {
    flex: 1;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1.1rem 1.3rem;
  }
  .stat .value {
    font-size: 2.1rem;
    font-weight: 700;
    color: var(--accent);
    line-height: 1.1;
  }
  .stat .label {
    font-size: 0.75rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-top: 0.35rem;
  }

  .controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 0.75rem;
    margin-bottom: 1rem;
  }
  .filter {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.9rem;
    color: var(--text-muted);
  }
  .segmented {
    display: inline-flex;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .segmented button {
    border: none;
    background: var(--card-bg);
    color: var(--text-muted);
    padding: 0.35rem 0.8rem;
    font-size: 0.85rem;
    cursor: pointer;
  }
  .segmented button.active {
    background: var(--accent);
    color: white;
  }

  section { margin-bottom: 2.75rem; }
  h2 {
    font-size: 0.8rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-muted);
    margin: 0;
  }
  .section-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    flex-wrap: wrap;
    gap: 0.75rem;
    margin-bottom: 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
  }

  .chart-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1.1rem 1.1rem 0.6rem;
  }
  svg.chart { width: 100%; height: auto; overflow: visible; }
  .hit { cursor: pointer; }
  .hit:hover + .bar { fill: var(--text); }
  .bar { fill: var(--accent); pointer-events: none; }
  .bar.selected { fill: var(--text); }
  .line-path { fill: none; stroke: var(--accent); stroke-width: 2; }
  .dot { fill: var(--accent); }
  .dot.selected { fill: var(--text); r: 6; }
  .axis-label { fill: var(--text-muted); font-size: 11px; }
  .axis-label.selected { fill: var(--text); font-weight: 600; }

  #tooltip {
    position: fixed;
    pointer-events: none;
    background: var(--text);
    color: var(--bg);
    padding: 0.3rem 0.55rem;
    border-radius: 6px;
    font-size: 0.78rem;
    opacity: 0;
    transform: translate(-50%, -130%);
    white-space: nowrap;
    z-index: 10;
    transition: opacity 0.08s;
  }

  .papers {
    display: flex;
    flex-direction: column;
    gap: 1.4rem;
    counter-reset: paper;
  }
  .paper {
    padding-bottom: 1.4rem;
    padding-left: 2.4rem;
    position: relative;
    border-bottom: 1px solid var(--border);
  }
  .paper::before {
    counter-increment: paper;
    content: counter(paper) ".";
    position: absolute;
    left: 0;
    top: 0;
    color: var(--text-muted);
    font-size: 0.95rem;
  }
  .paper:last-child { border-bottom: none; }
  .paper-title {
    font-size: 1.08rem;
    font-weight: 700;
    color: var(--text);
    text-decoration: none;
    line-height: 1.4;
  }
  .paper-title:hover { color: var(--accent); }
  .paper-authors {
    color: var(--text-muted);
    font-size: 0.9rem;
    margin-top: 0.35rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .paper-authors .me {
    font-weight: 700;
    text-decoration: underline;
    color: var(--text);
  }
  .paper-meta {
    color: var(--text-muted);
    font-size: 0.9rem;
    font-style: italic;
    margin-top: 0.3rem;
  }
  .badge {
    display: inline-block;
    font-size: 0.7rem;
    color: var(--accent);
    border: 1px solid var(--accent);
    border-radius: 999px;
    padding: 0.05rem 0.5rem;
    margin-left: 0.4rem;
    vertical-align: middle;
  }
  .clear-filter {
    font-size: 0.85rem;
    font-weight: 400;
    color: var(--accent);
    cursor: pointer;
    background: none;
    border: none;
    padding: 0;
    display: none;
  }
  .clear-filter:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="page">

  <header>
    <div>
      <h1>Christy W. LaFlamme</h1>
      <p class="bio">Postdoctoral Scholar, Division of Medical Genetics, University of Washington</p>
      <nav class="links">
        <a href="https://orcid.org/0000-0002-0808-3475" target="_blank" rel="noopener">ORCID</a>
        <span class="sep">·</span>
        <a href="https://scholar.google.com/citations?user=DJiyWuIAAAAJ&hl=en" target="_blank" rel="noopener">Google Scholar</a>
        <span class="sep">·</span>
        <a href="https://www.linkedin.com/in/christy-w-laflamme/" target="_blank" rel="noopener">LinkedIn</a>
      </nav>
    </div>
    <button id="theme-toggle" aria-label="Toggle dark mode" title="Toggle dark mode">◐</button>
  </header>

  <div class="stats">
    <div class="stat">
      <div class="value" id="stat-papers">–</div>
      <div class="label" id="label-papers">Papers</div>
    </div>
    <div class="stat">
      <div class="value" id="stat-citations">–</div>
      <div class="label" id="label-citations">Citations</div>
    </div>
    <div class="stat">
      <div class="value" id="stat-hindex">–</div>
      <div class="label">h-index</div>
    </div>
  </div>

  <div class="controls">
    <label class="filter">
      <input type="checkbox" id="preprint-filter" checked>
      Include preprints
    </label>
  </div>

  <section>
    <div class="section-head">
      <h2>Citations</h2>
      <div class="segmented" id="citation-view-toggle">
        <button data-view="peryear" class="active">Per year</button>
        <button data-view="cumulative">Cumulative</button>
      </div>
    </div>
    <div class="chart-card">
      <svg class="chart" id="citations-chart" viewBox="0 0 700 220"></svg>
    </div>
  </section>

  <section>
    <div class="section-head">
      <h2>Papers per year</h2>
    </div>
    <div class="chart-card">
      <svg class="chart" id="papers-chart" viewBox="0 0 700 220"></svg>
    </div>
  </section>

  <section>
    <div class="section-head">
      <h2>Papers</h2>
      <button class="clear-filter" id="clear-filter">Showing <span id="filter-year"></span> only — clear</button>
    </div>
    <div class="papers" id="papers-list"></div>
  </section>

</div>

<div id="tooltip"></div>

<script>
const root = document.documentElement;
const themeToggle = document.getElementById('theme-toggle');
const savedTheme = localStorage.getItem('theme');
if (savedTheme) root.setAttribute('data-theme', savedTheme);

function currentTheme() {
  if (root.getAttribute('data-theme')) return root.getAttribute('data-theme');
  return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
}
themeToggle.addEventListener('click', () => {
  const next = currentTheme() === 'dark' ? 'light' : 'dark';
  root.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
});

const tooltip = document.getElementById('tooltip');
function showTooltip(evt, text) {
  tooltip.textContent = text;
  tooltip.style.left = evt.clientX + 'px';
  tooltip.style.top = evt.clientY + 'px';
  tooltip.style.opacity = '1';
}
function moveTooltip(evt) {
  tooltip.style.left = evt.clientX + 'px';
  tooltip.style.top = evt.clientY + 'px';
}
function hideTooltip() {
  tooltip.style.opacity = '0';
}

const SVG_NS = 'http://www.w3.org/2000/svg';
function el(name, attrs) {
  const node = document.createElementNS(SVG_NS, name);
  for (const k in attrs) node.setAttribute(k, attrs[k]);
  return node;
}

function drawBarChart(svg, years, values, tooltipLabel, selectedYear, onSelect) {
  svg.innerHTML = '';
  const W = 700, H = 220, padL = 30, padB = 26, padT = 10, padR = 10;
  const innerW = W - padL - padR, innerH = H - padT - padB;
  const max = Math.max(1, ...values);
  const n = years.length;
  const gap = innerW / n * 0.25;
  const barW = innerW / n - gap;

  years.forEach((year, i) => {
    const v = values[i];
    const barH = (v / max) * innerH;
    const colX = padL + i * (innerW / n);
    const x = colX + gap / 2;
    const y = padT + innerH - barH;
    const isSelected = year === selectedYear;

    // Full-height transparent hit area so the whole column (and the space above
    // a short bar) is clickable, not just the coloured bar itself.
    const hit = el('rect', {
      x: colX, y: padT, width: innerW / n, height: innerH + padB,
      class: 'hit', fill: 'transparent',
    });
    hit.addEventListener('mouseenter', (e) => showTooltip(e, `${year}: ${tooltipLabel(v)}`));
    hit.addEventListener('mousemove', moveTooltip);
    hit.addEventListener('mouseleave', hideTooltip);
    hit.addEventListener('click', () => onSelect(year));
    svg.appendChild(hit);

    const rect = el('rect', {
      x, y, width: barW, height: Math.max(barH, v > 0 ? 2 : 0),
      class: 'bar' + (isSelected ? ' selected' : ''),
    });
    svg.appendChild(rect);

    if (n <= 12 || i % Math.ceil(n / 12) === 0) {
      const label = el('text', {
        x: x + barW / 2, y: H - 6, 'text-anchor': 'middle',
        class: 'axis-label' + (isSelected ? ' selected' : ''),
      });
      label.textContent = year;
      svg.appendChild(label);
    }
  });
}

function drawLineChart(svg, years, values, tooltipLabel, selectedYear, onSelect) {
  svg.innerHTML = '';
  const W = 700, H = 220, padL = 30, padB = 26, padT = 10, padR = 10;
  const innerW = W - padL - padR, innerH = H - padT - padB;
  const max = Math.max(1, ...values);
  const n = years.length;
  const stepX = n > 1 ? innerW / (n - 1) : 0;

  const points = years.map((year, i) => {
    const x = padL + i * stepX;
    const y = padT + innerH - (values[i] / max) * innerH;
    return { x, y, year, v: values[i] };
  });

  // Full-height transparent hit bands so the whole column is clickable.
  const bandW = n > 1 ? innerW / (n - 1) : innerW;
  points.forEach((p) => {
    const hit = el('rect', {
      x: p.x - bandW / 2, y: padT, width: bandW, height: innerH + padB,
      class: 'hit', fill: 'transparent',
    });
    hit.addEventListener('mouseenter', (e) => showTooltip(e, `${p.year}: ${tooltipLabel(p.v)}`));
    hit.addEventListener('mousemove', moveTooltip);
    hit.addEventListener('mouseleave', hideTooltip);
    hit.addEventListener('click', () => onSelect(p.year));
    svg.appendChild(hit);
  });

  const d = points.map((p, i) => (i === 0 ? 'M' : 'L') + p.x + ',' + p.y).join(' ');
  svg.appendChild(el('path', { d, class: 'line-path', 'pointer-events': 'none' }));

  points.forEach((p, i) => {
    const isSelected = p.year === selectedYear;
    const dot = el('circle', { cx: p.x, cy: p.y, r: isSelected ? 6 : 4, class: 'dot' + (isSelected ? ' selected' : ''), 'pointer-events': 'none' });
    svg.appendChild(dot);

    if (n <= 12 || i % Math.ceil(n / 12) === 0) {
      const label = el('text', {
        x: p.x, y: H - 6, 'text-anchor': 'middle',
        class: 'axis-label' + (isSelected ? ' selected' : ''),
      });
      label.textContent = p.year;
      svg.appendChild(label);
    }
  });
}

let citationView = 'peryear';
let selectedYear = null;
let papers = [];

function selectYear(year) {
  selectedYear = selectedYear === year ? null : year;
  render();
}

function hIndex(list) {
  const counts = list.map(p => p.cited_by_count).sort((a, b) => b - a);
  let h = 0;
  while (h < counts.length && counts[h] >= h + 1) h++;
  return h;
}

const isMe = (name) => /laflamme/i.test(name);
const esc = (s) => s.replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));
const authorHTML = (name) => isMe(name) ? `<span class="me">${esc(name)}</span>` : esc(name);

let _measureCtx;
function measureText(text, font) {
  if (!_measureCtx) _measureCtx = document.createElement('canvas').getContext('2d');
  _measureCtx.font = font;
  return _measureCtx.measureText(text).width;
}

// As many leading authors as fit on one line, then "(...)" and the last author.
// Christy's name is always kept in view: if she'd otherwise be truncated out of
// the middle, she's anchored in as "lead... (...) Christy (...) last".
function buildAuthors(authors, width, font) {
  if (!authors || authors.length === 0) return '';
  if (authors.length <= 2 || measureText(authors.join(', '), font) <= width) {
    return authors.map(authorHTML).join(', ');
  }
  const lastIdx = authors.length - 1;
  const last = authors[lastIdx];
  const meIdx = authors.findIndex(isMe);

  // Greedy: most leading authors (from the front) that fit alongside `tail`.
  const leadCount = (tail, cap) => {
    let count = 1;
    for (let i = 1; i <= cap; i++) {
      if (measureText(authors.slice(0, i).join(', ') + tail, font) <= width) count = i;
      else break;
    }
    return count;
  };

  const simpleCount = leadCount(' (...) ' + last, lastIdx);
  const sheShows = meIdx === -1 || meIdx === lastIdx || meIdx < simpleCount;
  if (sheShows) {
    return `${authors.slice(0, simpleCount).map(authorHTML).join(', ')} (...) ${authorHTML(last)}`;
  }

  // She's a hidden middle author — anchor her name between the gaps.
  const tail = ` (...) ${authors[meIdx]} (...) ${last}`;
  const count = Math.min(leadCount(tail, meIdx), meIdx);
  return `${authors.slice(0, count).map(authorHTML).join(', ')} (...) ${authorHTML(authors[meIdx])} (...) ${authorHTML(last)}`;
}

function render() {
  const includePreprints = document.getElementById('preprint-filter').checked;
  const filtered = papers.filter(p => includePreprints || p.type !== 'preprint');

  // Top numbers reflect the selected year when one is active; otherwise the totals.
  const forStats = filtered.filter(p => !selectedYear || p.year === selectedYear);
  document.getElementById('stat-papers').textContent = forStats.length;
  document.getElementById('stat-citations').textContent =
    forStats.reduce((sum, p) => sum + p.cited_by_count, 0);
  document.getElementById('label-papers').textContent =
    selectedYear ? `Papers in ${selectedYear}` : 'Papers';
  document.getElementById('label-citations').textContent =
    selectedYear ? `Citations in ${selectedYear}` : 'Citations';

  // h-index is a career metric — fixed regardless of the year or view toggle.
  document.getElementById('stat-hindex').textContent = hIndex(filtered);

  const pubYears = filtered.map(p => p.year).filter(Boolean);
  const citedYears = filtered.flatMap(p => Object.keys(p.counts_by_year).map(Number));
  const allYears = [...new Set([...pubYears, ...citedYears])].sort((a, b) => a - b);
  const minYear = allYears[0], maxYear = allYears[allYears.length - 1];
  const years = [];
  for (let y = minYear; y <= maxYear; y++) years.push(y);

  const citationsPerYear = years.map(y =>
    filtered.reduce((sum, p) => sum + (p.counts_by_year[y] || 0), 0)
  );
  const cumulativeCitations = [];
  citationsPerYear.reduce((acc, v, i) => (cumulativeCitations[i] = acc + v), 0);

  const papersPerYear = years.map(y => filtered.filter(p => p.year === y).length);

  const citationsSvg = document.getElementById('citations-chart');
  if (citationView === 'peryear') {
    drawBarChart(citationsSvg, years, citationsPerYear, v => `${v} citation${v === 1 ? '' : 's'}`, selectedYear, selectYear);
  } else {
    drawLineChart(citationsSvg, years, cumulativeCitations, v => `${v} total citation${v === 1 ? '' : 's'}`, selectedYear, selectYear);
  }

  drawBarChart(document.getElementById('papers-chart'), years, papersPerYear,
    v => `${v} paper${v === 1 ? '' : 's'}`, selectedYear, selectYear);

  document.getElementById('clear-filter').style.display = selectedYear ? 'inline' : 'none';
  document.getElementById('filter-year').textContent = selectedYear || '';

  const list = document.getElementById('papers-list');
  list.innerHTML = '';

  // Measure against the real author-line box (inside a .paper, which has a
  // left number gutter) so the one-line fit stays accurate.
  const probe = document.createElement('div');
  probe.className = 'paper';
  probe.innerHTML = '<div class="paper-authors"></div>';
  probe.style.visibility = 'hidden';
  list.appendChild(probe);
  const acs = getComputedStyle(probe.querySelector('.paper-authors'));
  const authorFont = `${acs.fontStyle} ${acs.fontWeight} ${acs.fontSize} ${acs.fontFamily}`;
  const padLeft = parseFloat(getComputedStyle(probe).paddingLeft) || 0;
  list.removeChild(probe);
  const authorWidth = ((list.clientWidth || 720) - padLeft) - 6;

  filtered
    .filter(p => !selectedYear || p.year === selectedYear)
    .slice()
    .sort((a, b) => (b.year || 0) - (a.year || 0))
    .forEach(p => {
      const item = document.createElement('div');
      item.className = 'paper';
      const preprintBadge = p.type === 'preprint' ? '<span class="badge">preprint</span>' : '';
      const authorsLine = buildAuthors(p.authors, authorWidth, authorFont);
      const authorsHTML = authorsLine ? `<div class="paper-authors">${authorsLine}</div>` : '';
      item.innerHTML = `
        <a class="paper-title" href="${p.link || '#'}" target="_blank" rel="noopener">${p.title}</a>${preprintBadge}
        ${authorsHTML}
        <div class="paper-meta">${p.venue || 'Unknown venue'} · ${p.year || ''} · ${p.cited_by_count} citation${p.cited_by_count === 1 ? '' : 's'}</div>
      `;
      list.appendChild(item);
    });
}

document.getElementById('citation-view-toggle').addEventListener('click', (e) => {
  const btn = e.target.closest('button');
  if (!btn) return;
  citationView = btn.dataset.view;
  document.querySelectorAll('#citation-view-toggle button').forEach(b => b.classList.toggle('active', b === btn));
  render();
});
document.getElementById('preprint-filter').addEventListener('change', render);
document.getElementById('clear-filter').addEventListener('click', () => { selectedYear = null; render(); });

let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(render, 150);
});

fetch('papers.json')
  .then(r => r.json())
  .then(data => { papers = data; render(); });
</script>
</body>
</html>
